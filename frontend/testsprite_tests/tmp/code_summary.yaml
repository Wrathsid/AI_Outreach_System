version: "2"
type: frontend
tech_stack:
  - typescript
  - react
  - next.js
  - tailwindcss
  - supabase
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: true
    description: Dashboard and pipeline overview
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: User login page
  - path: /signup
    file: src/app/signup/page.tsx
    auth_required: false
    description: User sign up page
  - path: /search
    file: src/app/search/page.tsx
    auth_required: true
    description: AI lead discovery and search page
  - path: /candidates
    file: src/app/candidates/page.tsx
    auth_required: true
    description: Saved candidates and drafts pipeline
features:
  - name: User Authentication
    description: Login and sign up using Supabase Email auth
    files:
      - src/app/login/page.tsx
      - src/app/signup/page.tsx
      - src/components/AuthGuard.tsx
      - src/lib/supabase.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login/Signup button
      - See error message on invalid credentials
      - Redirects to dashboard on success
    api_calls:
      - method: POST
        endpoint: supabase.auth
    auth_required: false
  - name: Search and Discover Leads
    description: Find candidates using AI intent and filters
    files:
      - src/app/search/page.tsx
      - src/lib/api.ts
    entry_route: /search
    user_interactions:
      - Type search queries in input box
      - Toggle advanced search filters (Company Size, Revenue, Tech Stack)
      - Click Scan button
      - View list of results
      - Select multiple results and add to pipeline
    api_calls:
      - method: GET
        endpoint: /api/discover/hr-search
      - method: POST
        endpoint: /api/drafts/generate-batch
    auth_required: true
  - name: Dashboard Stats
    description: View overall metrics and generated drafts
    files:
      - src/app/page.tsx
      - src/components/Dashboard.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View stats summary
      - View progress bar of background tasks
      - Navigate to leads
    api_calls:
      - method: GET
        endpoint: /api/stats
    auth_required: true
known_limitations: []
