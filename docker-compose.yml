services:
  # ─── Temporal Infrastructure ──────────────────────────────
  temporal:
    container_name: temporal
    depends_on:
      - postgresql
      - elasticsearch
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - USER=temporal
      - PWD=temporal
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - ENABLE_ES=true
      - ES_SEEDS=elasticsearch
      - ES_VERSION=v7
    image: temporalio/auto-setup:1.23.0
    networks:
      - temporal-network
    ports:
      - 7233:7233

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:latest
    networks:
      - temporal-network
    ports:
      - 8233:8080

  postgresql:
    container_name: postgresql
    environment:
      - POSTGRES_DB=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_USER=temporal
    image: postgres:13
    networks:
      - temporal-network
    ports:
      - 5432:5432

  elasticsearch:
    container_name: elasticsearch
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    image: elasticsearch:7.16.2
    networks:
      - temporal-network
    ports:
      - 9200:9200

  # ─── Application Services ────────────────────────────────
  backend:
    container_name: outreach-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    env_file:
      - ./backend/.env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - temporal
    networks:
      - temporal-network
    restart: unless-stopped

  worker:
    container_name: outreach-worker
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
      - backend
    networks:
      - temporal-network
    restart: unless-stopped

networks:
  temporal-network:
    driver: bridge
